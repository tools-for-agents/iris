# iris as a CI gate.
#
# Every tool in this kit shipped a broken phone layout past a green test suite,
# because a test suite does not look at the page. This makes looking part of the
# build: render the thing at real viewports in both themes, and fail if a control
# hangs off the edge, if text is unreadable, if the page throws.
#
#   - uses: tools-for-agents/iris@main
#     with:
#       url: http://localhost:7800/
#
# On failure it uploads the screenshots, so the CI log is not a paragraph about a
# page you cannot see — it hands you the page.
name: 'iris — look at it'
description: "Render a page at real viewports and themes, and fail the build if it's broken."

inputs:
  url:
    description: 'The page to look at (a URL, or a path to an .html file in the repo).'
    required: true
  viewports:
    description: 'phone, tablet, desktop — comma separated.'
    default: 'phone,desktop'
  themes:
    description: 'dark, light — comma separated.'
    default: 'dark,light'
  name:
    description: 'Label for the uploaded screenshots.'
    default: 'iris'
  tokens:
    description: >-
      A design system to grade against. A path in your repo, or "kit" for the
      tools-for-agents system that ships with iris. Empty = auto-detect
      ./tokens.json, and fall back to the heuristic (is this page consistent
      with ITSELF) if there is none.
    default: ''
  strict:
    description: 'Also fail on design drift (type scale, spacing grid, palette). Off by default — taste is a conversation, not a gate.'
    default: 'false'
  boot:
    description: >-
      JavaScript run BEFORE the page's own scripts do — the only place you can stand if you
      want to change the world the app wakes up in. Its main use is to break the API
      (stub `fetch` to return 500) and see what the app draws when the server says no.
      Every data-driven UI is a shell that asks a server what to render, and most have
      never rendered the answer "no" — they render an empty room instead, which is
      indistinguishable from having no data.
    default: ''
  pre:
    description: >-
      JavaScript run in the page after it loads and BEFORE it is audited, to put it into a
      state you would otherwise have to click to reach — a disabled button, a row toggled
      off, an error banner. Your gate has only ever seen the state the URL boots into, and
      the states it has never seen are the broken ones, because they are the ones nobody
      ever looks at. Fails the job if it throws: a state you could not reach did not pass.
    default: ''

runs:
  using: composite
  steps:
    - name: Find a browser
      id: chrome
      uses: browser-actions/setup-chrome@v1

    - name: Look
      id: look
      shell: bash
      env:
        IRIS_CHROME: ${{ steps.chrome.outputs.chrome-path }}
        IRIS_OUT: ${{ runner.temp }}/iris-${{ inputs.name }}
      run: |
        # The design system lives in ONE file (iris/tokens.json), and the action is
        # already a checkout of iris — so every repo can grade against the kit's system
        # without vendoring a copy of it. Seven copies of a design system is how you end
        # up with seven design systems.
        case "${{ inputs.tokens }}" in
          '')   TOK=() ;;
          kit)  TOK=(--tokens "${{ github.action_path }}/tokens.json") ;;
          *)    TOK=(--tokens "${{ inputs.tokens }}") ;;
        esac
        # `--strict` is decided by the CLI, by counting design findings. It used to be
        # decided HERE, by grepping the human report for the sentence "nobody decided it
        # either" — a gate that silently stops gating the day someone rewords a headline.
        [ "${{ inputs.strict }}" = "true" ] && STRICT=(--strict) || STRICT=()

        PRE=()
        if [ -n "${{ inputs.pre }}" ]; then PRE=(--pre "${{ inputs.pre }}"); fi
        BOOT=()
        if [ -n "${{ inputs.boot }}" ]; then BOOT=(--boot "${{ inputs.boot }}"); fi

        node "${{ github.action_path }}/src/cli.js" look "${{ inputs.url }}" \
          --viewports "${{ inputs.viewports }}" --themes "${{ inputs.themes }}" \
          "${TOK[@]}" "${STRICT[@]}" "${PRE[@]}" "${BOOT[@]}" | tee "$RUNNER_TEMP/iris.txt"
        code=${PIPESTATUS[0]}
        # The report is the useful artefact, so put it in the job summary where a
        # human will actually read it — not buried in a fold of the log.
        { echo '### 👁 iris'; echo '```'; cat "$RUNNER_TEMP/iris.txt"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
        exit $code

    - name: Hand over the pictures
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: iris-${{ inputs.name }}
        path: ${{ runner.temp }}/iris-${{ inputs.name }}
        if-no-files-found: warn
