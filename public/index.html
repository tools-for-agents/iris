<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👁</text></svg>" />
<title>iris — the agent's eye</title>
<style>
  :root {
    --bg:#0b0e14; --panel:#11151d; --panel-2:#161b26; --line:#1e2530; --line-2:#2a3340;
    --txt:#e6edf3; --muted:#9fb0bf; --faint:#8593a1; --accent:#c792ea; --ok:#4fd6be; --bad:#ff6b6b; --warn:#f5a623;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
  }
  :root[data-theme="light"] {
    --bg:#f7f8fa; --panel:#ffffff; --panel-2:#f0f2f5; --line:#e2e6ea; --line-2:#cfd6dd;
    --txt:#12161b; --muted:#4a5560; --faint:#5c6773; --accent:#6d28d9; --ok:#046c60; --bad:#c62a1e; --warn:#96430a;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg:#f7f8fa; --panel:#ffffff; --panel-2:#f0f2f5; --line:#e2e6ea; --line-2:#cfd6dd;
      --txt:#12161b; --muted:#4a5560; --faint:#5c6773; --accent:#6d28d9; --ok:#046c60; --bad:#c62a1e; --warn:#96430a;
    }
  }
  * { box-sizing:border-box; }
  .nochrome { padding: 12px 20px; border-bottom:1px solid var(--line);
    background:color-mix(in srgb, var(--iris, #c792ea) 12%, var(--panel)); font-size:12px; line-height:1.6; }
  .nochrome[hidden] { display:none; }
  .nochrome b { color:var(--txt); font-weight:600; }
  .go:disabled { opacity:1 !important; background:var(--panel-2) !important; color:var(--txt) !important;
    border-color:var(--line) !important; cursor:not-allowed; }
  body { margin: 0; padding-bottom: 44px; background:var(--bg); color:var(--txt); font:14px/1.6 system-ui,-apple-system,sans-serif; }
  /* A <p> with no declared margin takes 1em from the BROWSER's stylesheet — which here
     is 14px, off the 4px grid we declare. iris caught this on its own page, the first
     time strict was switched on. A value nobody wrote is still a value you own. */
  p { margin: 0 0 16px; }

  header { display:flex; align-items:center; gap: 16px; padding: 12px 20px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:10; }
  .logo { display:flex; align-items:center; gap: 8px; flex:none; }
  .logo .g { font-size:20px; }
  .logo b { font-family:var(--mono); font-size:16px; letter-spacing:.5px; }
  .logo .tag { font-family:var(--mono); font-size:12px; color:var(--muted); }

  .bar { flex:1; min-width:0; display:flex; align-items:center; gap: 8px; }
  .field { flex:1; min-width:0; display:flex; align-items:center; gap: 8px; height:36px; padding: 0 12px;
           background:var(--panel-2); border:1px solid var(--line); border-radius:8px; }
  .field:focus-within { border-color:var(--accent); }
  .field input { flex:1; min-width:0; border:0; background:none; outline:none; color:var(--txt); font-family:var(--mono); font-size:14px; }
  .field input::placeholder { color:var(--faint); }
  .go { flex:none; height:36px; padding: 0 16px; border-radius:8px; cursor:pointer; font-family:var(--mono); font-size:12px;
        border:1px solid var(--accent); background:var(--accent); color:var(--bg); font-weight:600; }
  .go:hover { filter:brightness(1.1); }
  .go.ghost { background:transparent; color:var(--accent); }
  /* `opacity:.5` painted the label at half strength — 2.93:1, unreadable. A disabled
     control still has to be READABLE: you have to be able to see what it is you cannot
     press. Say "inert" with colour, not by fading the words out of existence. (The same
     mistake as the cross-tool strip, and iris only caught it once it learned that opacity
     does not inherit as a computed value.) */
  .go[disabled] { cursor:default; }
  .theme-btn { flex:none; padding:0; width:34px; height:34px; border-radius:8px; cursor:pointer; border:1px solid var(--line); background:var(--panel-2); color:var(--muted); font-size:14px; }

  main { display:grid; grid-template-columns:270px 1fr; min-height:calc(100vh - 61px); }
  aside { border-right:1px solid var(--line); background:var(--panel); padding: 16px; overflow-y:auto; }
  /* iris told me this page scrolled sideways by 202px on a phone: a 270px rail plus
     300px-minimum cards cannot fit 390px. It was right, so the rail stacks. */
  @media (max-width: 720px) {
    main { grid-template-columns:1fr; }
    .logo .tag { display:none; }
    .verdict .sp { margin-left: 0; }
    aside { border-right:0; border-bottom:1px solid var(--line); }
    header { flex-wrap:wrap; }
    .bar { order:3; width:100%; }
    .sheet { grid-template-columns:1fr; }
  }
  .side-h { font-family:var(--mono); font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:var(--faint); margin: 0 0 12px; }
  /* Every run row is a real <button>: iris's own unreachable-control rule caught these as
     divs — cursor:pointer, no tabindex, so the reader's ONLY navigation was mouse-only.
     A <button> brings Tab, Enter and Space with it, and announces itself, for free.
     🔑 A BUTTON CARRIES A UA STYLESHEET: font does NOT inherit, text centres, and Chrome
     supplies `1px 6px` of padding to anything that does not say otherwise (that is exactly
     how agent-hq's three close buttons landed 6px off the grid). Say all of it out loud. */
  .run { display:flex; gap: 8px; align-items:flex-start; padding: 8px 12px; border-radius:8px; cursor:pointer; border:1px solid transparent; margin-bottom: 4px;
         width:100%; text-align:left; font:inherit; color:inherit; background:transparent; -webkit-appearance:none; appearance:none; }
  .run:hover { background:var(--panel-2); }
  .run.on { background:var(--panel-2); border-color:var(--line-2); }
  .run:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  /* An unreadable record is a status line, not a destination. */
  .run.torn { cursor:default; }
  .run .v { flex:none; font-size:14px; line-height:1.4; }
  .run .v.ok { color:var(--ok); } .run .v.bad { color:var(--bad); } .run .v.warn { color:var(--warn); }
  .run .t { min-width:0; }
  .run .nm { font-family:var(--mono); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .run .sub { font-family:var(--mono); font-size:12px; color:var(--faint); }

  section { padding: 20px 24px; min-width:0; }
  .empty { color:var(--muted); font-size:14px; max-width:560px; line-height:1.7; }
  .empty code { font-family:var(--mono); font-size:12px; background:var(--panel-2); padding: 1px 8px; border-radius:8px; color:var(--accent); }

  .verdict { display:flex; align-items:center; gap: 12px; flex-wrap:wrap; padding: 12px 16px; border-radius:12px; margin-bottom: 16px;
             font-family:var(--mono); font-size:12px; border:1px solid var(--line); background:var(--panel); }
  .verdict.pass { border-color:color-mix(in srgb, var(--ok) 45%, transparent); background:color-mix(in srgb, var(--ok) 8%, transparent); }
  .verdict.fail { border-color:color-mix(in srgb, var(--bad) 45%, transparent); background:color-mix(in srgb, var(--bad) 8%, transparent); }
  .verdict .big { font-size:14px; font-weight:600; }
  .verdict .pass-t { color:var(--ok); } .verdict .fail-t { color:var(--bad); }
  .verdict .sp { margin-left: auto; display:flex; flex-wrap:wrap; gap: 8px; }
  .pill { font-family:var(--mono); font-size:12px; padding: 2px 8px; border-radius:999px; border:1px solid var(--line-2); color:var(--muted); }
  .pill.high { color:var(--bad); border-color:color-mix(in srgb, var(--bad) 50%, transparent); }
  .pill.medium { color:var(--warn); border-color:color-mix(in srgb, var(--warn) 50%, transparent); }

  /* the contact sheet — every render, side by side. this IS the tool. */
  .sheet { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr)); gap: 16px; margin-bottom: 24px; }
  .shot { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--panel); }
  .shot .h { display:flex; align-items:center; gap: 8px; padding: 8px 12px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:12px; color:var(--muted); }
  .shot .h b { color:var(--txt); }
  .shot .h .n { margin-left: auto; }
  .shot .h .n.bad { color:var(--bad); } .shot .h .n.ok { color:var(--ok); }
  .shot img { display:block; width:100%; height:auto; background:#fff; cursor:zoom-in; }
  :root[data-theme="light"] .shot img { background:#fff; }

  .vio { border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .vio-h { padding: 8px 12px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:var(--faint); background:var(--panel); }
  .v-row { display:flex; gap: 12px; padding: 12px 12px; border-bottom:1px solid var(--line); background:var(--panel); }
  .v-row:last-child { border-bottom:0; }
  .v-sev { flex:none; font-family:var(--mono); font-size:12px; padding: 2px 8px; border-radius:8px; height:fit-content; letter-spacing:.5px;
           border:1px solid var(--line-2); color:var(--muted); }
  .v-sev.high { color:var(--bad); border-color:color-mix(in srgb, var(--bad) 50%, transparent); background:color-mix(in srgb, var(--bad) 10%, transparent); }
  .v-sev.medium { color:var(--warn); border-color:color-mix(in srgb, var(--warn) 50%, transparent); }
  .v-sev.design { color:var(--accent); border-color:color-mix(in srgb, var(--accent) 50%, transparent); }
  .sc-row { display:flex; gap: 8px; align-items:baseline; margin-bottom: 4px; font-family:var(--mono); font-size:12px; }
  .sc-l { flex:none; width:64px; color:var(--faint); }
  .sc-v { display:flex; flex-wrap:wrap; gap: 4px; }
  .sc-v i { font-style:normal; padding: 2px 8px; border-radius:8px; background:var(--panel-2); border:1px solid var(--line); color:var(--muted); }
  .v-b { min-width:0; flex:1; }
  .v-rule { font-family:var(--mono); font-size:12px; color:var(--accent); }
  .v-sel { font-family:var(--mono); font-size:12px; color:var(--faint); word-break:break-all; }
  .v-txt { font-size:12px; color:var(--txt); margin-top: 4px; }
  .v-det { font-size:12px; color:var(--muted); margin-top: 2px; }
  .v-at { font-family:var(--mono); font-size:12px; color:var(--faint); margin-top: 4px; }
  .swatch { display:inline-block; width:9px; height:9px; border-radius:4px; border:1px solid var(--line-2); vertical-align:middle; margin: 0 2px; }

  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:50; padding: 24px; cursor:zoom-out; }
  .lightbox.show { display:flex; }
  .lightbox img { max-width:100%; max-height:100%; border-radius:8px; }

  .spin { display:inline-block; width:11px; height:11px; border:2px solid var(--line-2); border-top-color:var(--accent); border-radius:50%; animation:s .7s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
  /* 🔑 THE EYE RENDERS EVERY OTHER PAGE IN THIS KIT WITH `prefers-reduced-motion: reduce`, AND NEVER
     ANSWERED IT ITSELF. src/browser.js explains the whole design decision like this: "waiting for the
     animations to END is not available: a spinner, a pulse, a drifting nebula never end, and this kit
     has all three." The spinner in that sentence IS THIS ONE. It spun through every render of iris's
     own reader, and through every render for a reader who had asked the machine to hold still.
     Stopping it costs nothing: the ring is decoration, and the sentence beside it — "opening a browser
     and looking at …" — is what actually says work is happening. That sentence does not move.
     Placed AFTER the rule it overrides, on purpose: same specificity, later wins, and a reduced-motion
     block written above its target is decoration (agent-hq shipped one that did nothing). */
  @media (prefers-reduced-motion: reduce) { .spin { animation:none; } }
  .err { color:var(--bad); font-family:var(--mono); font-size:12px; padding: 12px 12px; border:1px solid color-mix(in srgb, var(--bad) 40%, transparent);
         border-radius:8px; background:color-mix(in srgb, var(--bad) 8%, transparent); margin-bottom: 16px; }
</style>

<div id="noChrome" class="nochrome" hidden></div>
<header>
  <div class="logo"><span class="g">👁</span><div><b>iris</b> <span class="tag">the agent's eye</span></div></div>
  <div class="bar">
    <div class="field">
      <span style="color:var(--faint);font-size:14px">▸</span>
      <input id="t" placeholder="a URL, or a path to an .html file you just wrote…" autocomplete="off" spellcheck="false" />
    </div>
    <button class="go" id="look">look</button>
    <button class="go ghost" id="play">play ▸</button>
  </div>
  <button class="theme-btn" id="theme" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
</header>

<main>
  <aside>
    <p class="side-h" id="sideH">what the eye has seen</p>
    <div id="runs"></div>
  </aside>
  <section id="view"></section>
</main>

<div class="lightbox" id="lb"><img id="lbi" alt="" /></div>

<script>
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
// ── WHEN THE SERVER SAYS NO, SAY SO ──────────────────────────────────────────────
//
// Every one of these UIs is a shell that asks a server what to draw, and not one of
// them had ever rendered the answer "no". The helper was the same in all seven:
//
//     const api = (p) => fetch(p).then((r) => r.json());
//
// It never looks at `r.ok`. A 500 with a JSON body parses perfectly and is handed back
// AS DATA, so the render function calls `.map` on an error object, throws halfway
// through, and leaves the page as a blank shell — no columns, no rows, no message.
//
// So when agent-hq's backend died, the board showed you AN EMPTY ROOM. Nothing on the
// screen distinguished "the server is down" from "you have no tasks" — and the CI gate
// that renders the empty first-run page proves that empty looks FINE, so it passed.
//
// An error state that renders as an empty state is worse than a crash: a crash tells you
// something happened.
class ApiError extends Error {}

function apiDown(msg) {
  ASKED('error');   // a failure is not an answer of "nothing"
  lastFailed = true;   // ...and busy(false) must not overwrite that when the request settles
  let b = document.getElementById('apidown');
  if (!b) {
    b = document.createElement('div');
    b.id = 'apidown';
    b.setAttribute('role', 'alert');
    // Inline, self-contained, and its own background — so it is legible in either theme
    // and cannot be faded out by a stylesheet that has never seen it.
    b.style.cssText = 'position:fixed;left:0;right:0;top:0;z-index:99999;display:flex;gap:12px;'
      + 'align-items:center;justify-content:center;flex-wrap:wrap;padding:12px 16px;'
      + 'background:#7f1d1d;color:#fff;font:600 14px/1.5 ui-sans-serif,system-ui,sans-serif;';
    document.body.appendChild(b);
  }
  b.textContent = '';
  const t = document.createElement('span');
  t.textContent = 'The server said no — this page is showing you nothing because it was told nothing. ' + msg;
  const r = document.createElement('button');
  r.textContent = 'try again';
  r.style.cssText = 'background:#fff;color:#7f1d1d;border:0;border-radius:6px;padding:6px 12px;'
    + 'font:700 14px/1.5 ui-sans-serif,system-ui,sans-serif;cursor:pointer;min-height:24px;';
  r.onclick = () => location.reload();
  b.append(t, r);

  // MAKE ROOM FOR IT — measured, after the text is in, so the height is the real one.
  // A fixed bar at top:0 sits ON TOP of the app's own header, so the first cut of this
  // reported the outage by hiding the title bar. That is not an improvement. box-sizing
  // is forced to border-box so the padding eats into a 100vh body instead of overflowing it.
  document.body.style.boxSizing = 'border-box';
  document.body.style.paddingTop = b.getBoundingClientRect().height + 'px';
}

// Only OUR "the server said no" is swallowed. A real TypeError still reaches the console,
// where iris's console gate can see it — silencing everything would trade a visible bug
// for an invisible one.
// ── AND SAY WHEN YOU ARE STILL ASKING ────────────────────────────────────────────
//
// These apps had exactly ONE way of showing "nothing": nothing. So three completely
// different truths all rendered as the same picture —
//
//     you have no data      · the empty state
//     the server is broken  · (fixed above)
//     the server is THINKING · this
//
// A slow backend put lens's welcome screen on the screen — "Pick a file from the tree" —
// over a tree that had not loaded yet. The empty state is a CLAIM ("you have nothing"),
// and the app was making it before it had any evidence. It had not been told "nothing";
// it had not been told ANYTHING.
//
// So: while a request is in flight, say so. aria-busy for anything listening, and a
// visible pill for the human — after a beat, so a fast answer never flickers.
let inflight = 0, busyTimer = null;
// ── AN EMPTY STATE IS A CLAIM. DO NOT MAKE IT UNTIL YOU HAVE BEEN TOLD. ───────────
//
// The pill above says "still asking" — but the welcome screen was STILL SITTING THERE
// underneath it, saying "Pick a file from the tree" over a tree that had not loaded.
// So the app contradicted itself: asking, and answering, at the same time.
//
// "You have nothing" and "I have not been told yet" are different statements, and only
// one of them is true before the server answers. So while the first answer is
// outstanding — and after one that FAILED — the empty state is withheld. Not deleted:
// hidden, with the layout kept, so nothing jumps when the truth arrives.
//
// data-asked is set only once a request is actually in flight, so a page that never
// fetches at all is untouched and shows its empty state exactly as before. (Hiding it
// unconditionally would have hidden it FOREVER on any page with no API.)
let everAnswered = false;
// A REQUEST THAT FAILED IS NOT AN ANSWER — and busy(false) used to say it was.
// apiDown() sets ASKED('error') so the empty state is withheld... and then the `finally`
// block ran busy(false), which declared ASKED('yes') the moment the request SETTLED,
// success or failure alike. The claim came straight back, milliseconds later.
// So the page said "The server said no" and "you have nothing" AT THE SAME TIME: the
// exact self-contradiction cycle 35 was written to end, undone by the very next line.
let lastFailed = false;
const ASKED = (v) => document.documentElement.setAttribute('data-asked', v);

(function withholdTheClaim() {
  const st = document.createElement('style');
  const hide = ['.empty', '.empty2', '.welcome', '.list-empty', '.detail-empty', '.flow-empty', '.act-empty']
    .flatMap((c) => [`[data-asked="no"] ${c}`, `[data-asked="error"] ${c}`]).join(',');
  st.textContent = `${hide}{visibility:hidden !important;}`;
  (document.head || document.documentElement).appendChild(st);
})();

function busy(on) {
  inflight += on ? 1 : -1;
  if (inflight < 0) inflight = 0;
  document.body.setAttribute('aria-busy', inflight > 0 ? 'true' : 'false');
  // Before the first answer lands, the app has not been told "nothing" — it has not been
  // told anything — so it must not say "nothing".
  if (inflight > 0 && !everAnswered) ASKED('no');
  if (on && inflight === 1) lastFailed = false;   // a fresh batch: nothing has failed yet
  if (inflight === 0 && !on) {
    if (lastFailed) ASKED('error');                // settled, but nobody answered
    else { everAnswered = true; ASKED('yes'); }
  }
  if (inflight > 0) {
    if (busyTimer) return;
    // 300ms: below this a human reads it as "instant", and a pill that flashes on every
    // fast request is noise that teaches you to ignore the one time it matters.
    busyTimer = setTimeout(() => { const p = busyPill(); p.hidden = false; }, 300);
  } else {
    clearTimeout(busyTimer); busyTimer = null;
    const p = document.getElementById('busypill');
    if (p) p.hidden = true;
  }
}

function busyPill() {
  let p = document.getElementById('busypill');
  if (!p) {
    p = document.createElement('div');
    p.id = 'busypill';
    p.setAttribute('role', 'status');       // announced, not shouted
    p.textContent = 'still asking the server…';
    // Its own background, like the error bar — so no stylesheet can fade it out and it
    // is legible in either theme.
    p.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:99998;padding:8px 14px;'
      + 'border-radius:999px;background:#1e3a5f;color:#fff;'
      + 'font:600 13px/1.5 ui-sans-serif,system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.4);';
    document.body.appendChild(p);
  }
  return p;
}

addEventListener('unhandledrejection', (e) => {
  if (e.reason instanceof ApiError) { apiDown(e.reason.message); e.preventDefault(); }
});

const api = async (p, o) => {
  busy(true);
  try {
  const r = await fetch(p, o);
  // r.ok, the check that was never there. A 500 with a JSON body parses fine and
  // comes back looking exactly like data — which is how `.map is not a function`
  // ends up being what a user sees when their server falls over.
  if (!r.ok) throw new ApiError(`${p} — HTTP ${r.status} ${r.statusText || ''}`.trim());
  return await r.json();
  } finally { busy(false); }
};
let RUNS = [], CUR = null;

// ── theme ────────────────────────────────────────────────────────────────────
const TK = 'iris:theme';
try { const t = localStorage.getItem(TK); if (t) document.documentElement.dataset.theme = t; } catch {}
$('#theme').addEventListener('click', () => {
  const cur = document.documentElement.dataset.theme
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  try { localStorage.setItem(TK, next); } catch {}
});

// ── the run list ─────────────────────────────────────────────────────────────
async function loadRuns(select) {
  RUNS = await api('/api/runs');
  $('#runs').innerHTML = RUNS.length ? RUNS.map((r) => {
    // A run whose record iris cannot READ is not a run that FAILED. Rendered as a normal row it would
    // show "✗ undefined · 0h 0m" — a wrong answer wearing the costume of a real one. Say what it is.
    if (r.unreadable) {
      // Not a control: there is nothing to show. It kept `data-id` and .run's cursor:pointer,
      // so it invited a click and answered with an empty panel. A row that cannot go anywhere
      // must not look like it can.
      return `<div class="run torn">
        <span class="v warn">⚠</span>
        <div class="t">
          <div class="nm">${esc(r.id)}</div>
          <div class="sub">record unreadable — not a failed run</div>
        </div>
      </div>`;
    }
    const ok = r.summary?.passed;
    const on = CUR && CUR.id === r.id;
    return `<button type="button" class="run ${on ? 'on' : ''}" data-id="${esc(r.id)}" ${on ? 'aria-current="true"' : ''}>
      <span class="v ${ok ? 'ok' : 'bad'}">${ok ? '✓' : '✗'}</span>
      <div class="t">
        <div class="nm">${esc(r.target)}</div>
        <div class="sub">${r.kind === 'play' ? '🎮 play' : '👁 look'} · ${ok ? 'clean' : `${r.summary?.high || 0}h ${r.summary?.medium || 0}m`}</div>
      </div>
    </button>`;
  }).join('') : `<div style="color:var(--faint);font-size:12px">nothing yet</div>`;
  if (select) show(select);
}
$('#runs').addEventListener('click', (e) => {
  const el = e.target.closest('[data-id]'); if (!el) return;
  const r = RUNS.find((x) => x.id === el.dataset.id);
  if (r) show(r);
});

// ── looking ──────────────────────────────────────────────────────────────────
async function run(kind) {
  const target = $('#t').value.trim();
  if (!target) { $('#t').focus(); return; }
  for (const b of ['#look', '#play']) $(b).disabled = true;
  $('#view').innerHTML = `<div class="empty"><span class="spin"></span> opening a browser and looking at <b>${esc(target)}</b>…</div>`;
  try {
    const body = kind === 'play'
      ? { target, seconds: 3, keys: 'ArrowLeft,ArrowRight,ArrowUp,ArrowDown,Space' }
      : { target, viewports: 'phone,tablet,desktop', themes: 'dark,light' };
    const r = await api('/api/' + kind, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (r.error) { $('#view').innerHTML = `<div class="err">${esc(r.error)}</div>`; return; }
    CUR = r;
    await loadRuns(r);
  } catch (e) {
    $('#view').innerHTML = `<div class="err">${esc(e.message || e)}</div>`;
  } finally {
    for (const b of ['#look', '#play']) $(b).disabled = false;
  }
}
$('#look').addEventListener('click', () => run('look'));
$('#play').addEventListener('click', () => run('play'));
$('#t').addEventListener('keydown', (e) => { if (e.key === 'Enter') run('look'); });

// ── the contact sheet ────────────────────────────────────────────────────────
function show(r) {
  CUR = r;
  document.querySelectorAll('.run').forEach((el) => {
    const on = el.dataset.id === r.id;
    el.classList.toggle('on', on);
    // The highlight and the announcement are the same fact. Toggling only the class would
    // tell a sighted user which run is open and a screen reader nothing at all.
    if (on) el.setAttribute('aria-current', 'true'); else el.removeAttribute('aria-current');
  });
  const s = r.summary || {};
  const shots = r.kind === 'play'
    ? (r.frames || []).map((f, i) => ({ file: f.file, label: `frame ${i}`, theme: '', n: null }))
    : (r.shots || []).map((x) => ({ file: x.file, label: x.viewport, theme: x.theme, n: (x.violations || []).length }));

  const metrics = r.kind === 'play' && r.metrics?.instrumented
    ? `<span class="pill">${r.metrics.fps} fps</span>
       <span class="pill">${r.unique_frames}/${(r.frames || []).length} distinct frames</span>
       <span class="pill">worst hitch ${r.metrics.worst_hitch_ms}ms</span>
       ${r.input ? `<span class="pill ${r.input.changed ? '' : 'high'}">input ${r.input.changed ? 'registered' : 'IGNORED'}</span>` : ''}`
    : `<span class="pill">${(r.shots || []).length} renders</span>`;

  $('#view').innerHTML = `
    <div class="verdict ${s.passed ? 'pass' : 'fail'}">
      <span class="big ${s.passed ? 'pass-t' : 'fail-t'}">${s.passed ? '✓ nothing broken' : '✗ ' + (s.high || 0) + ' to fix'}</span>
      <span style="color:var(--muted)">${esc(r.target)}</span>
      <span class="sp">
        ${metrics}
        ${s.high ? `<span class="pill high">${s.high} high</span>` : ''}
        ${s.medium ? `<span class="pill medium">${s.medium} medium</span>` : ''}
        ${s.low ? `<span class="pill">${s.low} low</span>` : ''}
        ${s.console_errors ? `<span class="pill high">${s.console_errors} console</span>` : ''}
      </span>
    </div>
    <div class="sheet">${shots.map((x) => `
      <div class="shot">
        <div class="h"><b>${esc(x.label)}</b>${x.theme ? `<span>${esc(x.theme)}</span>` : ''}
          ${x.n != null ? `<span class="n ${x.n ? 'bad' : 'ok'}">${x.n ? x.n + ' issue' + (x.n === 1 ? '' : 's') : 'clean'}</span>` : ''}</div>
        <img loading="lazy" src="/api/shot?id=${encodeURIComponent(r.id)}&file=${encodeURIComponent(x.file)}" alt="${esc(x.label)}" />
      </div>`).join('')}</div>
    ${violationsHtml(r)}
    ${designHtml(r)}`;
}

// Taste, kept visually separate from defects — "this is broken" and "nobody decided
// this" are different conversations, and mixing them teaches you to skim both.
function designHtml(r) {
  const D = r.design?.findings || [];
  const sc = r.design?.scales;
  if (!D.length && !sc) return '';
  const scaleRow = (label, items, unit) => !items?.length ? '' :
    `<div class="sc-row"><span class="sc-l">${label}</span><span class="sc-v">${items.slice(0, 14)
      .map((x) => `<i title="used ${x.count}x">${esc(x.value)}${unit || ''}</i>`).join('')}</span></div>`;
  return `<div class="vio" style="margin-top: 16px">
    <div class="vio-h">${D.length ? 'nothing is broken here, but nobody decided it either' : 'the scales you actually built'}</div>
    ${D.map((d) => `<div class="v-row">
      <span class="v-sev design">design</span>
      <div class="v-b"><div class="v-rule">${esc(d.rule)}</div><div class="v-det">${esc(d.detail)}</div></div>
    </div>`).join('')}
    ${sc ? `<div class="v-row"><div class="v-b">
      ${scaleRow('type', sc.type, 'px')}
      ${scaleRow('radius', sc.radius, 'px')}
      ${scaleRow('spacing', sc.spacing, 'px')}
    </div></div>` : ''}
  </div>`;
}

// One row per defect — collapsed across viewports, because the same bug at three
// widths is one bug, and listing it three times buries the other two.
function violationsHtml(r) {
  const order = { high: 0, medium: 1, low: 2 };
  const seen = new Map();
  for (const v of [...(r.violations || [])].sort((a, b) => order[a.severity] - order[b.severity])) {
    const key = v.rule + '|' + v.selector;
    if (!seen.has(key)) seen.set(key, { ...v, where: [] });
    seen.get(key).where.push(`${v.viewport || ''}${v.theme ? '/' + v.theme : ''}`.replace(/^\//, ''));
  }
  const rows = [...seen.values()];
  const cons = (r.console_errors || []).slice(0, 6);
  if (!rows.length && !cons.length) return '';
  return `<div class="vio"><div class="vio-h">what a glance would have caught</div>
    ${rows.map((v) => `<div class="v-row">
      <span class="v-sev ${v.severity}">${v.severity}</span>
      <div class="v-b">
        <div><span class="v-rule">${esc(v.rule)}</span> <span class="v-sel">${esc(v.selector)}</span></div>
        ${v.text ? `<div class="v-txt">“${esc(v.text)}”</div>` : ''}
        <div class="v-det">${esc(v.detail)}${v.fg ? ` <span class="swatch" style="background:${esc(v.fg)}"></span>on<span class="swatch" style="background:${esc(v.bg)}"></span>` : ''}</div>
        ${v.where.filter(Boolean).length ? `<div class="v-at">at ${esc([...new Set(v.where)].join(', '))}</div>` : ''}
      </div></div>`).join('')}
    ${cons.map((c) => `<div class="v-row">
      <span class="v-sev high">${esc(c.level)}</span>
      <div class="v-b"><div class="v-rule">console</div><div class="v-det">${esc(String(c.text).split('\n')[0].slice(0, 200))}</div></div>
    </div>`).join('')}
  </div>`;
}

// ── lightbox ─────────────────────────────────────────────────────────────────
document.addEventListener('click', (e) => {
  const img = e.target.closest('.shot img');
  if (img) { $('#lbi').src = img.src; $('#lb').classList.add('show'); return; }
  if (e.target.closest('#lb')) $('#lb').classList.remove('show');
});
addEventListener('keydown', (e) => { if (e.key === 'Escape') $('#lb').classList.remove('show'); });

// ── boot ─────────────────────────────────────────────────────────────────────
(async () => {
  const st = await api('/api/stats');
  $('#view').innerHTML = `<div class="empty">
    <p><b>Point it at something you just built.</b> iris opens a real browser, renders the page at phone, tablet and desktop
    widths in <i>both</i> themes, and measures what a glance would catch — the page scrolling sideways, a button clipped off
    the edge, grey-on-grey you cannot read, 9px type, text printing over text, a console full of exceptions.</p>
    <p><b>For a game, press <code>play ▸</code></b> instead. A screenshot cannot tell you a game is dead: one that draws a
    perfect frame and then never draws again looks flawless in a still. iris watches it move, counts the frames, and presses
    the keys to see whether it answers.</p>
    <p style="color:var(--faint)">browser: <code>${esc(st.chrome || 'NOT FOUND — set IRIS_CHROME')}</code></p>
  </div>`;

  // NO BROWSER MEANS IRIS CANNOT DO THE ONE THING IT IS FOR.
  //
  // The page did say so — in the smallest, faintest text on it, at the bottom of two
  // paragraphs of copy, styled like a footnote. Meanwhile the big `look` button sat at the
  // top, bright and inviting, offering to do the one thing that cannot happen.
  //
  // A page that whispers the reason it cannot work, and shouts the button that will not,
  // is the same lie anvil told with "The forge is cold". Say it where it is read, and take
  // away the button that cannot fire — a control that looks alive and does nothing is
  // worse than one that looks dead: it invites the click, and then says nothing at all.
  const warn = $('#noChrome');
  if (!st.chrome) {
    warn.hidden = false;
    warn.innerHTML = '<b>iris cannot see anything: no browser found.</b> iris drives a real Chrome to render your page — '
      + 'without one it cannot look at all, and this is not a problem with your page. '
      + 'Install Chrome or Chromium, or point <code>IRIS_CHROME</code> at a binary you already have. '
      + '(Already have one running with a debug port? Set <code>IRIS_CDP</code> instead.)';
    for (const id of ['look', 'play']) {
      const b = $('#' + id);
      if (b) { b.disabled = true; b.title = 'no browser found — iris cannot render anything'; }
    }
  } else {
    warn.hidden = true;
    for (const id of ['look', 'play']) { const b = $('#' + id); if (b) b.disabled = false; }
  }
  await loadRuns();
  if (RUNS.length) show(RUNS[0]);
})();
</script>
