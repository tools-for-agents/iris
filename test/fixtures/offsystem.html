<!doctype html>
<!-- Internally consistent — and not on the system. iris's generic critique would let
     this through: it uses few sizes, few radii, and its spacing is regular. It just
     obeys a system nobody declared, instead of the one you did. -->
<html><head><meta charset="utf-8"><title>off-system</title>
<style>
  body { margin:0; background:#0b0e14; color:#e6edf3; font:15px/1.6 system-ui,sans-serif; padding:18px; }
  .card { background:#161b26; border-radius:10px; padding:18px; margin:0 0 18px; }
  h1 { font-size:26px; margin:0 0 10px; }
  button { font-size:15px; padding:10px 18px; border-radius:6px; border:0; background:#c792ea; color:#0b0e14; }
</style></head>
<body>
  <div class="card"><h1>Consistent, and wrong</h1><button>Consistent with itself</button></div>
</body></html>
