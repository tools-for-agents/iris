<!doctype html><html><head><meta charset="utf-8"><title>states</title>
<style>
  body { background:#0d1017; color:#e6ebf5; padding:40px; font:16px system-ui; }
  button { background:#2b6cb0; color:#fff; border:0; padding:12px 20px; border-radius:6px; font:16px system-ui; }
  button:disabled { opacity:.18; }          /* only visible once the button is disabled */
  .row { color:#c9d3e6; padding:6px; }
  .row.off { opacity:.2; }                  /* only visible once the row is switched off */
</style></head>
<body>
  <button id="go">Run the thing</button>
  <div class="row" id="r">tool six</div>
</body></html>
