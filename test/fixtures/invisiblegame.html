<!doctype html>
<!-- A game that renders, animates at 60fps, and answers the keys. Every check iris
     had before this passes. And you cannot see it: the player and the obstacles are
     tasteful dark greys on a dark ground, 1.9:1, and the canvas is stretched 2×.
     "It works" and "you can play it" are not the same sentence. -->
<html><head><meta charset="utf-8"><title>invisible</title>
<style>body{margin:0;background:#0b0e14} canvas{width:640px;height:400px;display:block}</style></head>
<body><canvas id="c" width="320" height="200"></canvas>
<script>
  const ctx = document.getElementById('c').getContext('2d');
  let t = 0;
  (function loop() {
    t++;
    ctx.fillStyle = '#0b0e14'; ctx.fillRect(0, 0, 320, 200);
    ctx.fillStyle = '#2a3140';                       // 1.6:1 — a shape you cannot see
    ctx.fillRect(40 + (t % 200), 90, 24, 24);
    ctx.fillStyle = '#252b38';                       // and another
    ctx.fillRect(200, 40 + ((t * 2) % 120), 20, 20);
    requestAnimationFrame(loop);
  })();
</script>
</body></html>
