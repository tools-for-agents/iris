<!doctype html>
<!-- A page with every mistake an agent makes when it writes CSS without looking.
     Each defect here is one iris must catch; the test asserts it does. -->
<html><head><meta charset="utf-8"><title>broken</title>
<style>
  body { margin: 0; background: #ffffff; font-family: system-ui, sans-serif; }
  /* 1. pushes the page wider than any viewport → horizontal scroll */
  .wide { width: 2400px; height: 40px; background: #eee; }
  /* 2. hangs off the right edge → a button you cannot click */
  .escapee { position: relative; left: 96%; width: 220px; padding: 10px; background: #333; color: #fff; }
  /* 3. 8px type */
  .whisper { font-size: 8px; color: #000; }
  /* 4. grey on white — the classic "looks tasteful, is unreadable" */
  .ghost { color: #c8c8c8; background: #ffffff; font-size: 15px; }
  /* 5. a 14px icon button */
  .pip { width: 14px; height: 14px; padding: 0; border: 0; background: #444; cursor: pointer; }
  /* 6. two labels printing on top of each other */
  .stack { height: 60px; }
  .stack .a, .stack .b { display: block; width: 200px; height: 24px; font-size: 16px; }
  .stack .b { margin-top: -22px; }   /* pulled up onto .a — text printing over text */
</style></head>
<body>
  <div class="wide">wide element</div>
  <button class="escapee">Save changes</button>
  <p class="whisper">Terms and conditions apply to this offer.</p>
  <p class="ghost">This paragraph is technically present.</p>
  <button class="pip"></button>
  <div class="stack">
    <div class="a">Total revenue</div>
    <div class="b">Total revenue</div>
  </div>
  <script>
    // 7. and it throws
    undefinedFunction();
  </script>
</body></html>
