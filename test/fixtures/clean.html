<!doctype html>
<!-- The counterweight to broken.html. A checker that flags everything is as
     useless as one that flags nothing — this page must come back clean, at every
     viewport, in both themes. -->
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>clean</title>
<style>
  :root { --bg: #ffffff; --fg: #16191d; --muted: #55606b; --accent: #0b5fff; --on-accent: #ffffff; --line: #dfe3e8; }
  @media (prefers-color-scheme: dark) {
    /* the dark accent is LIGHT, so white text on it is 2.42:1 — the label has to
       flip dark with it. iris caught this in the page written to prove iris works. */
    :root { --bg: #0d1117; --fg: #e8ecf1; --muted: #9aa6b2; --accent: #6ea8fe; --on-accent: #0d1117; --line: #232a33; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 16px/1.6 system-ui, sans-serif; }
  main { max-width: 640px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 28px; margin: 0 0 12px; }
  p { color: var(--muted); margin: 0 0 20px; }   /* 5.6:1 light, 7.4:1 dark */
  .row { display: flex; flex-wrap: wrap; gap: 12px; }
  button {
    font: inherit; min-height: 44px; padding: 12px 20px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--line); background: transparent; color: var(--fg);
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
</style></head>
<body>
  <main>
    <h1>Everything fits</h1>
    <p>No horizontal scroll, nothing clipped, readable contrast in both themes, and touch targets you can actually hit.</p>
    <div class="row">
      <button class="primary">Save changes</button>
      <button>Cancel</button>
    </div>
  </main>
</body></html>
