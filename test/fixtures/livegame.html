<!doctype html>
<!-- A real loop that answers the arrow keys. -->
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>live game</title>
<style>body{margin:0;background:#0b0e14}canvas{display:block}</style></head>
<body><canvas id="c" width="640" height="360"></canvas>
<script>
  const ctx = document.getElementById('c').getContext('2d');
  let x = 300, t = 0;
  addEventListener('keydown', (e) => { if (e.key === 'ArrowRight') x += 40; if (e.key === 'ArrowLeft') x -= 40; });
  (function loop() {
    t++;
    ctx.fillStyle = '#0b0e14'; ctx.fillRect(0, 0, 640, 360);
    ctx.fillStyle = '#4fd6be';
    ctx.fillRect(x, 160 + Math.sin(t / 10) * 30, 40, 40);
    requestAnimationFrame(loop);
  })();
</script>
</body></html>
