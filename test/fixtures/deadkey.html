<!doctype html>
<!-- Still until you press something. ArrowRight moves the block; Space is wired to
     nothing at all, exactly like the HUD that promises a dash there isn't. Press them
     together and "the pixels changed" — one working key covering for a dead one. -->
<html><head><meta charset="utf-8"><title>deadkey</title>
<style>body{margin:0;background:#0b0e14} canvas{display:block}</style></head>
<body><canvas id="c" width="640" height="360"></canvas>
<script>
  const ctx = document.getElementById('c').getContext('2d');
  let x = 100;
  const draw = () => {
    ctx.fillStyle = '#0b0e14'; ctx.fillRect(0, 0, 640, 360);
    ctx.fillStyle = '#4fd6be'; ctx.fillRect(x, 160, 40, 40);
  };
  addEventListener('keydown', (e) => { if (e.key === 'ArrowRight') { x += 40; draw(); } });
  draw();
  requestAnimationFrame(function f() { requestAnimationFrame(f); });   // a loop that draws nothing new
</script>
</body></html>
